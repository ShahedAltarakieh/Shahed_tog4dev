<div class="stay-in-touch-container">
  <form (ngSubmit)="onSubmitClick()">
    <p class="title">{{ "stay connected" | translate }}</p>

    <div class="email-address-container">
      <label for="newsletter-email" class="sr-only">{{ "e-mail" | translate }}</label>
      <input id="newsletter-email" class="email-input" type="email" [value]="emailValue" placeholder="{{ 'e-mail' | translate}}" (input)="onEmailChange($event)" />

      <button class="form-submit-btn" type="submit" aria-label="Subscribe">
        <img src="/app/assets/images/shared/arrow-black.svg" alt="" aria-hidden="true" />
      </button>
    </div>

    @if (footerService.newsLetterResponseMsg) {
      <p class="response-message">{{ footerService.newsLetterResponseMsg }}</p>
    }

    <p class="description">{{ "Want to stay updated with our latest news and projects? Share your email below:" | translate }}</p>
  </form>
</div>
