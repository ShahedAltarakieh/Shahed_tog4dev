<div class="about-us-wrapper {{ storageService.siteLanguage$.value }}">
  <div class="control-icon next-icon">
    <img src="/app/assets/images/shared/arrow.svg" alt="arrow"/>
  </div>
  <div class="control-icon previous-icon">
    <img src="/app/assets/images/shared/arrow.svg" alt="arrow"/>
  </div>

  <div class="swiper" #swiperContainer>
    <div class="swiper-wrapper">
        <div class="swiper-slide position-relative">
          <div class="slide-img">
            <img src="/app/assets/images/ngoverse/silver-{{ storageService.siteLanguage$.value }}.jpeg?v=1" alt="ngoverse silver"/>
          </div>
        </div>

        <div class="swiper-slide position-relative">
          <div class="slide-img">
            <img src="/app/assets/images/ngoverse/gold-{{ storageService.siteLanguage$.value }}.jpeg?v=1" alt="ngoverse gold"/>
          </div>
        </div>

        <div class="swiper-slide position-relative">
          <div class="slide-img">
            <img src="/app/assets/images/ngoverse/platinum-{{ storageService.siteLanguage$.value }}.jpeg?v=1" alt="ngoverse platinum"/>
          </div>
        </div>
    </div>
  </div>
</div>
