<div class="tg-section-header">
  <h2 class="tg-section-title">{{ "our projects" | translate }}</h2>
  <p class="tg-section-subtitle">{{ "discover the impact of our projects across communities" | translate }}</p>
  <div class="tg-title-decoration"><span></span></div>
</div>

<div class="row">
  <div class="col-12">
    <div class="filter-buttons">
      <button [ngClass]="{'active': (activeCategory === 'all')}" (click)="setActiveCategory('all')">{{ "all" | translate}}</button>
      <button [ngClass]="{'active': (activeCategory === 'projects')}" (click)="setActiveCategory('projects')">{{ "projects" | translate}}</button>
      <button [ngClass]="{'active': (activeCategory === 'crowdfunding')}" (click)="setActiveCategory('crowdfunding')">{{ "crowdfunding" | translate}}</button>
    </div>
  </div>
  @for (item of visibleProjects; track item) {
    <div class="col-12 col-lg-6 col-md-6 col-xl-4 pb-4 project-card-wrap">
      <app-project-list-item ngskiphydration [project]="item"/>
    </div>
  }

  @if (hasMore || canShowLess) {
    <div class="col-12 d-flex justify-content-center load-more-wrap">
      @if (hasMore) {
        <button type="button" class="load-more-btn" (click)="loadMore()">
          {{ "load more" | translate }}
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      }
      @if (canShowLess && !hasMore) {
        <button type="button" class="load-more-btn outlined" (click)="showLess()">
          {{ "show less" | translate }}
        </button>
      }
    </div>
  }
</div>
