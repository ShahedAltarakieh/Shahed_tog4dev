<section class="maintenance-wrap">
  <!-- Floating decorative shapes -->
  <div class="shape shape--circle shape--1" aria-hidden="true"></div>
  <div class="shape shape--circle shape--2" aria-hidden="true"></div>
  <div class="shape shape--ring shape--3" aria-hidden="true"></div>
  <div class="shape shape--dot shape--4" aria-hidden="true"></div>
  <div class="shape shape--dot shape--5" aria-hidden="true"></div>
  <div class="shape shape--star shape--6" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.39 6.95L22 9.27l-5.5 4.73L18.18 22 12 17.77 5.82 22l1.68-7.99L2 9.27l7.61-.32L12 2z"/></svg>
  </div>
  <div class="shape shape--star shape--7" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.39 6.95L22 9.27l-5.5 4.73L18.18 22 12 17.77 5.82 22l1.68-7.99L2 9.27l7.61-.32L12 2z"/></svg>
  </div>

  <div class="maintenance-card">
    <!-- Animated tool scene -->
    <div class="scene" aria-hidden="true">
      <div class="scene__halo"></div>
      <div class="scene__sparks">
        <span class="spark spark--1"></span>
        <span class="spark spark--2"></span>
        <span class="spark spark--3"></span>
      </div>
      <div class="scene__tool">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
    </div>

    <span class="badge-tag">
      <span class="badge-tag__pulse"></span>
      {{ 'page under update' | translate }}
    </span>

    <h1 class="title">{{ title }}</h1>

    <p class="lead">
      <ng-container *ngIf="message; else defaultMsg">{{ message }}</ng-container>
      <ng-template #defaultMsg>
        {{ "we're improving this page. please check back soon." | translate }}
      </ng-template>
    </p>

    <!-- Playful progress bar -->
    <div class="progress" aria-hidden="true">
      <div class="progress__bar"></div>
    </div>
    <span class="progress__hint">{{ 'our team is on it' | translate }}</span>

    <div class="actions">
      <a class="btn-primary" [routerLink]="['/', storageService.siteLanguage$.value]">
        <svg class="btn-primary__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12l9-9 9 9"/>
          <path d="M5 10v10h14V10"/>
        </svg>
        {{ 'back to home' | translate }}
      </a>
    </div>
  </div>
</section>
