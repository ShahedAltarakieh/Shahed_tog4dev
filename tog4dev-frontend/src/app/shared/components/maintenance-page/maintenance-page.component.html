<section class="maintenance-wrap">
  <div class="maintenance-card">
    <div class="icon-wrap" aria-hidden="true">
      <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <span class="badge-tag">{{ 'page under update' | translate }}</span>

    <h1 class="title">{{ title }}</h1>

    <p class="lead">
      <ng-container *ngIf="message; else defaultMsg">{{ message }}</ng-container>
      <ng-template #defaultMsg>
        {{ "we're improving this page. please check back soon." | translate }}
      </ng-template>
    </p>

    <div class="actions">
      <a class="btn-primary" [routerLink]="['/', storageService.siteLanguage$.value]">
        {{ 'back to home' | translate }}
      </a>
    </div>
  </div>
</section>
