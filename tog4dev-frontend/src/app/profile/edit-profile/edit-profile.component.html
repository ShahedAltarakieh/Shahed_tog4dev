<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10">
            <h1 class="text-left text-white">{{ "profile" | translate }}</h1>
        </div>
    </div>
</div>
<hr>
<div class="container form-container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-2">
            <div class="edit-profile-action">
                @if (!imageUrl) {
                    <img class="img-fluid" src="/app/assets/images/shared/default-image.jpg" alt="default" style="height: 170px; object-fit: cover; object-position: center" />
                } @else {
                    <img class="img-fluid" [src]="imageUrl" alt="user img" style="height: 170px; object-fit: cover; object-position: center" />
                }
                <label for="profileImg" class="upload-btn d-flex align-items-center justify-content-center text-center">
                    {{ "upload image" | translate }}
                </label>
                <input id="profileImg" type="file" name="file" accept="image/*" (change)="onProfileImageUpload($event)">
            </div>
        </div>
        <div class="col-10 col-md-8">
            <div class="row form-row">
                <div class="form-group col-12 col-md-6">
                    <app-basic-input
                        [inputAttr]="{ id: 'first-name', name: 'first-name', label: 'first name', placeholder: 'your first name', isRequired: true}"
                        [value]="editProfileService.editForm.first_name.value"
                        [errorMsg]="editProfileService.editForm.first_name.errorMsg"
                        inputType="first name"
                        (valueChanged)="editProfileService.editForm.first_name.value= $event"
                        (errorChanged)="firstNameErrorHandler($event)"
                    />
                </div>
                <div class="form-group col-12 col-md-6">
                    <app-basic-input
                        [inputAttr]="{ id: 'last-name', name: 'last-name', label: 'last name', placeholder: 'your last name', isRequired: true}"
                        [value]="editProfileService.editForm.last_name.value"
                        [errorMsg]="editProfileService.editForm.last_name.errorMsg"
                        inputType="last name"
                        (valueChanged)="editProfileService.editForm.last_name.value = $event"
                        (errorChanged)="lastNameErrorHandler($event)"
                    />
                </div>
                <div class="form-group col-12">
                    <app-basic-input
                        [inputAttr]="{ id: 'email', name: 'email', label: 'e-mail', placeholder: 'enter your email', isRequired: true, icon: 'email'}"
                        [value]="editProfileService.editForm.email.value"
                        [errorMsg]="editProfileService.editForm.email.errorMsg"
                        inputType="email"
                        (valueChanged)="editProfileService.editForm.email.value= $event"
                        (errorChanged)="emailErrorHandler($event)"
                    />
                </div>
                <div class="form-group col-12">
                    <app-basic-input
                        [inputAttr]="{ id: 'password', name: 'password', label: 'password', placeholder: 'enter your password', isRequired: false, icon: 'eye'}"
                        [value]="editProfileService.editForm.password.value"
                        [errorMsg]="editProfileService.editForm.password.errorMsg"
                        inputType="password"
                        (valueChanged)="editProfileService.editForm.password.value = $event"
                        (errorChanged)="passwordErrorHandler($event)"
                    />
                </div>
                <div class="form-group col-12">
                    <app-select-dropdown
                            id="country"
                            [items]="countries_list"
                            [value]="editProfileService.editForm.country.value"
                            [errorMsg]="editProfileService.editForm.country.errorMsg"
                            [selectedDropdownValue]="country_selected.country_name_english"
                            icon="{{ country_flag }}"
                            label="country"
                            placeholder="Your Country"
                            rightIcon="mobile-arrow.svg"
                            (valueChanged)="editProfileService.editForm.country.value = $event"
                            (errorChanged)="countryErrorHandler($event)"
                    />
                </div>
                <div class="form-group col-12">
                    <app-basic-input
                        [inputAttr]="{ id: 'city', name: 'city', label: 'city', placeholder: 'enter city', isRequired: false, icon: 'location'}"
                        [value]="editProfileService.editForm.city.value"
                        [errorMsg]="editProfileService.editForm.city.errorMsg"
                        inputType="city"
                        (valueChanged)="editProfileService.editForm.city.value = $event"
                        (errorChanged)="cityErrorHandler($event)"
                    />
                </div>
                <div class="form-group col-12">
                    <app-basic-input
                            [inputAttr]="{ id: 'birthday', name: 'birthday', label: 'birthday', placeholder: 'yyyy/mm/dd', isRequired: false, icon: 'date'}"
                            [value]="editProfileService.editForm.birthday.value"
                            [errorMsg]="editProfileService.editForm.birthday.errorMsg"
                            inputType="birthday"
                            (valueChanged)="editProfileService.editForm.birthday.value= $event"
                    />
                </div>
            </div>
        </div>
        <div class="col-md-10 text-center">
            <button
                class="edit-profile-submit"
                [disabled]="
                        !editProfileService.editForm.first_name.isValid ||
                        !editProfileService.editForm.last_name.isValid ||
                        !editProfileService.editForm.email.isValid"
                (click)="submit()"
            >
                {{ "save" | translate }}
            </button>
        </div>
    </div>
</div>
<hr>

<app-modal (valueEmitted)="show_edit_modal = false" [with_icon]="true" [title]="'save successful' | translate " [show]="show_edit_modal">
    <img withicon src="/app/assets/images/shared/check.png" alt="check" style="width:100px" class="d-block mx-auto">
</app-modal>
